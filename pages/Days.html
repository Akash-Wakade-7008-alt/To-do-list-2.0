<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - Weekly Planner</title>

    <link rel="shortcut icon" href="../assets/taskFlow.ico" type="image/x-icon" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 120vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #1b5e20);
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        padding: 20px;
      }

      header {
        width: 100%;
        max-width: 1200px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .back-btn {
        padding: 10px 25px;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(90deg, #00c853, #69f0ae);
        color: #0f172a;
        transition: 0.3s;
      }

      .back-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 200, 83, 0.5);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-text {
        font-size: 22px;
        font-weight: 600;
      }

      .day-title {
        text-align: center;
        font-size: clamp(32px, 6vw, 60px);
        font-weight: 700;
        background: linear-gradient(90deg, #00c853, #69f0ae);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 50px;
      }

      .wrapper {
        width: 100%;
        max-width: 1200px;
        display: flex;
        margin-top: 10vh;
        justify-content: center;
      }

      .cards {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
      }

      .card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        padding: 40px 20px;
        border-radius: 25px;
        cursor: pointer;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-6px);
      }

      .card h3 {
        font-size: 20px;
        letter-spacing: 2px;
      }

      a {
        text-decoration: none;
        color: white;
      }

      @media (max-width: 600px) {
        header {
          flex-direction: column;
          gap: 15px;
        }

        .back-btn {
          width: 100%;
          max-width: 200px;
        }
        .wrapper {
          margin-top: 2vh;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <button class="back-btn" onclick="goBack()">Back</button>

      <div class="logo">
        <svg width="45" height="45" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00c853" />
              <stop offset="100%" stop-color="#69f0ae" />
            </linearGradient>
          </defs>
          <rect
            x="10"
            y="10"
            width="80"
            height="80"
            rx="20"
            fill="url(#logoGradient)"
          />
          <path
            d="M30 50 L45 65 L70 35"
            stroke="#0f172a"
            stroke-width="8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <div class="logo-text">TaskFlow</div>
      </div>
    </header>

    <h1 class="day-title">Choose the Day</h1>

    <div class="wrapper">
      <div class="cards">
        <a href="../pages/sunday.html"
          ><div class="card"><h3>Sunday</h3></div></a
        >
        <a href="../pages/monday.html"
          ><div class="card"><h3>Monday</h3></div></a
        >
        <a href="../pages/tuesday.html"
          ><div class="card"><h3>Tuesday</h3></div></a
        >
        <a href="../pages/wednesday.html"
          ><div class="card"><h3>Wednesday</h3></div></a
        >
        <a href="../pages/thursday.html"
          ><div class="card"><h3>Thursday</h3></div></a
        >
        <a href="../pages/friday.html"
          ><div class="card"><h3>Friday</h3></div></a
        >
        <a href="../pages/saturday.html"
          ><div class="card"><h3>Saturday</h3></div></a
        >
      </div>
    </div>

    <script>
      function goBack() {
        window.location.href = "../index.html";
      }
    </script>
  </body>
</html>
